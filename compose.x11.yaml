# X11 display server configuration
# Requires: xhost +SI:localuser:$USER

services:
  tlauncher:
    # Allow the container to reach the host X11 socket. On SELinux systems
    # (Fedora/RHEL) the confined container is otherwise denied access to
    # /tmp/.X11-unix, producing "Can't connect to X11 window server".
    security_opt:
      - label=disable

    environment:
      DISPLAY: ${DISPLAY}
      XAUTHORITY: /tmp/.Xauthority
      XDG_RUNTIME_DIR: /run/user/1000

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - ${XAUTHORITY}:/tmp/.Xauthority:ro
