# Base TLauncher configuration
# This file contains common settings shared across all configurations
# Do NOT run this file directly - use it with overlay files

services:
  tlauncher:
    image: tlauncher-java
    container_name: tlauncher
    read_only: true

    security_opt:
      - no-new-privileges

    cap_drop:
      - ALL

    pids_limit: 512
    mem_limit: 8g

    environment:
      # HiDPI/QHD scaling for the TLauncher GUI (1 = no scaling).
      # Auto-detected on the host by the launcher; export JAVA_UI_SCALE to override.
      JAVA_UI_SCALE: ${JAVA_UI_SCALE:-1}
      # Java2D acceleration for the launcher's Swing UI (reduces stutter).
      # Default is XRender; set JAVA2D_OPENGL=1 for the GPU pipeline, or
      # JAVA2D_PIPELINE=x11 to disable acceleration.
      JAVA2D_OPENGL: ${JAVA2D_OPENGL:-}
      JAVA2D_PIPELINE: ${JAVA2D_PIPELINE:-}

    volumes:
      - ./launcher:/home/app/launcher:Z
      - ./home:/home/app/.minecraft:Z
      - ./tlauncher-data:/home/app/.tlauncher:Z
      - ./entrypoint.sh:/home/app/entrypoint.sh:ro,Z

    tmpfs:
      - /tmp:size=1G,mode=1777
      - /home/app/.java:size=100M
      - /home/app/.cache:size=100M

    command: ["/bin/bash", "/home/app/entrypoint.sh"]
