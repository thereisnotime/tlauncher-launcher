# Base TLauncher configuration
# This file contains common settings shared across all configurations
# Do NOT run this file directly - use it with overlay files

services:
  tlauncher:
    image: tlauncher-java
    container_name: tlauncher
    read_only: true

    security_opt:
      - no-new-privileges

    cap_drop:
      - ALL

    pids_limit: 512
    mem_limit: 8g

    # JVM / rendering tuning. The base only passes through host-set values; the
    # actual per-display defaults are set in the display overlays (compose.x11
    # / compose.wayland / compose.wslg). See entrypoint.sh for what each does.
    # Override any of these on the command line, e.g. JAVAFX_PRISM=sw ./minecraft.py start
    environment:
      JAVA_UI_SCALE: ${JAVA_UI_SCALE:-}
      JAVA2D_PIPELINE: ${JAVA2D_PIPELINE:-}
      JAVAFX_PRISM: ${JAVAFX_PRISM:-}
      JAVA_DISABLE_GRAB: ${JAVA_DISABLE_GRAB:-}
      JAVA_PREFER_IPV4: ${JAVA_PREFER_IPV4:-}

    volumes:
      - ./launcher:/home/app/launcher:Z
      - ./home:/home/app/.minecraft:Z
      - ./tlauncher-data:/home/app/.tlauncher:Z
      - ./entrypoint.sh:/home/app/entrypoint.sh:ro,Z

    tmpfs:
      - /tmp:size=1G,mode=1777
      - /home/app/.java:size=100M
      - /home/app/.cache:size=100M

    command: ["/bin/bash", "/home/app/entrypoint.sh"]
