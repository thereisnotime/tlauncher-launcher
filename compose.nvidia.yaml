# NVIDIA GPU configuration
# Direct device passthrough — no NVIDIA container runtime hook (avoids
# ldcache errors in read-only containers). Libraries and the host ldcache
# are mounted directly so the dynamic linker can find NVIDIA libs.

services:
  tlauncher:
    devices:
      - /dev/dri:/dev/dri
      - /dev/nvidia0:/dev/nvidia0
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia-modeset:/dev/nvidia-modeset
      - /dev/nvidia-uvm:/dev/nvidia-uvm
      - /dev/nvidia-uvm-tools:/dev/nvidia-uvm-tools

    volumes:
      - /usr/lib/x86_64-linux-gnu:/usr/lib/x86_64-linux-gnu:ro
      - /usr/share/glvnd:/usr/share/glvnd:ro
      - /etc/ld.so.cache:/etc/ld.so.cache:ro
