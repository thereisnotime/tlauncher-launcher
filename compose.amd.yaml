# AMD GPU configuration
# Uses the container's own Mesa drivers via the /dev/dri passthrough.
# Note: we deliberately do NOT bind-mount host GL libraries. Those paths are
# distro-specific (e.g. /usr/lib/x86_64-linux-gnu only exists on Debian/Ubuntu,
# not Fedora/Arch) and mounting them aborts the container with a statfs error.

services:
  tlauncher:
    devices:
      - /dev/dri:/dev/dri
